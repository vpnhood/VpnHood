name: Publish iOS App Store Metadata

# Manual-only: pushes the App Store listing (metadata + screenshots) from fastlane/metadata/ios/**
# to App Store Connect via fastlane deliver, WITHOUT uploading a build. The iOS twin of
# publish_store_contents.yml (Google Play). Use it to create/refresh the listing text + screenshots
# independently of client_publish.yml (which ships the binary).
#
# Secrets (App Store Connect API key — same trio used by client_publish.yml):
#   APPSTORE_CONNECT_API_KEY / _API_KEY_ID / _ISSUER_ID   If the key is absent, the push is SKIPPED
#       with a warning (job stays green). A present key that fails to push FAILS the job (red).

on:
  workflow_dispatch:
    inputs:
      skip_metadata:
        description: "Skip the text metadata push (use to upload ONLY screenshots — needed to work around deliver's 'No data' bug on a brand-new app's first version)"
        type: boolean
        required: false
        default: false
      skip_screenshots:
        description: "Skip the screenshots push (upload ONLY text metadata)"
        type: boolean
        required: false
        default: false

jobs:
  publish-ios-metadata:
    runs-on: macos-26
    permissions:
      contents: read
    env:
      # Mapped to env so steps can test presence in `if:` (the `secrets` context isn't allowed there).
      APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
      APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
      APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # No key -> warn and skip (steps below gated on the same condition). Not a failure.
      - name: Warn if App Store Connect API key is missing
        if: env.APPSTORE_CONNECT_API_KEY == ''
        run: |
          echo "::warning title=iOS metadata publish skipped::APPSTORE_CONNECT_API_KEY secret is not set; the App Store listing will NOT be updated. Add APPSTORE_CONNECT_API_KEY/_API_KEY_ID/ISSUER_ID (see .github/DEPLOYMENT.md) to enable it."

      - name: Set up Ruby
        if: env.APPSTORE_CONNECT_API_KEY != ''
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install Fastlane
        if: env.APPSTORE_CONNECT_API_KEY != ''
        run: gem install fastlane --no-document

      # Build the fastlane App Store Connect API-key JSON from the three secrets (never echoed).
      - name: Write ASC API key
        if: env.APPSTORE_CONNECT_API_KEY != ''
        shell: bash
        run: |
          mkdir -p asc
          jq -n --arg kid "$APPSTORE_CONNECT_API_KEY_ID" --arg iss "$APPSTORE_CONNECT_ISSUER_ID" --arg key "$APPSTORE_CONNECT_API_KEY" \
            '{key_id:$kid, issuer_id:$iss, key:$key, in_house:false}' > asc/api_key.json

      - name: Push iOS App Store metadata + screenshots
        if: env.APPSTORE_CONNECT_API_KEY != ''
        shell: bash
        run: |
          set -o pipefail
          echo "🚀 Publishing iOS App Store listing (metadata + screenshots) for com.vpnhood.client.ios"
          if fastlane ios upload_metadata skip_metadata:${{ github.event.inputs.skip_metadata || 'false' }} skip_screenshots:${{ github.event.inputs.skip_screenshots || 'false' }} 2>&1 | tee fastlane.log; then
            echo "✅ iOS App Store listing published"
          else
            # Surface fastlane's REAL error as a GitHub ::error:: annotation at the top of the run,
            # instead of the bare "Process completed with exit code 1". fastlane prints failures as
            # "[!] <message>" (and deliver adds "Error: <detail>"); grab those lines.
            ERR=$(sed -E $'s/\x1b\\[[0-9;]*m//g' fastlane.log \
                  | grep -E '^\[!\]|Error:' | tail -6 | sed 's/^\[!\] *//' \
                  | tr '\n' ' ' | sed 's/  */ /g')
            [ -z "$ERR" ] && ERR="fastlane deliver failed with no captured message — see the step log."
            echo "::error title=iOS metadata push failed::${ERR}"
            exit 1
          fi

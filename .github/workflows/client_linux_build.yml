name: Build Client · Linux (standalone)

# Build-only entry point: manually build the VpnHood Linux client without running the full publish
# pipeline. Delegates to the shared reusable workflow _build_client_linux.yml (the single source of
# truth for the build steps); the produced files are uploaded as the `client-linux` artifact
# (retained 1 day) for inspection. GitHub releases are created by client_publish.yml, not here.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to build (blank = this workflow's branch)"
        required: false
        default: ""

jobs:
  build-linux:
    uses: ./.github/workflows/_build_client_linux.yml
    with:
      ref: ${{ github.event.inputs.ref }}

# Workflow not appearing after a fresh fork/import? See .github/DEPLOYMENT.md "Activating the workflows".

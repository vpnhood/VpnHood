name: publish_app (reusable)

# SINGLE SOURCE OF TRUTH for publishing a VpnHood app — client OR connect. Called via `uses:` by
# publish_client.yml (this repo) and connect_publish.yml (the vpnhood/Vpnhood.App.Connect repo).
# This is the public entry point: forkers pin it (e.g. @v1) — no leading underscore (that marks the
# internal _build_app_* sub-modules this orchestrates).
#
# Orchestrates the small per-platform build modules (_build_app_{linux,windows,android,ios}.yml) and
# adds the store-publish + GitHub-release jobs. A reusable workflow runs in the CALLER's context, so
# github.repository / vars / secrets resolve to whichever repo invoked it: client releases to
# vpnhood/VpnHood with the monorepo fastlane; connect releases to the Connect repo with the Connect
# fastlane — one definition, no duplicated workflow. Build code is always checked out from
# vpnhood/VpnHood into code/; the caller repo is checked out at the root for its fastlane/ + release
# target. The `app` input (client|connect) drives every difference.

on:
  workflow_call:
    inputs:
      app:
        description: "Which app to publish: client | connect"
        type: string
        required: true
      code_ref:
        description: "vpnhood/VpnHood branch or commit to build (blank = its default branch)"
        type: string
        required: false
        default: ""
      publish_release:
        type: boolean
        required: false
        default: false
      build_android:
        type: boolean
        required: false
        default: true
      publish_play:
        type: boolean
        required: false
        default: true
      only_aab:
        type: boolean
        required: false
        default: false
      build_ios:
        type: boolean
        required: false
        default: true
      publish_appstore:
        type: boolean
        required: false
        default: true
      rollout:
        type: string
        required: false
        default: "100"

env:
  CODE_REPO: vpnhood/VpnHood

jobs:
  # --- Per-platform builds: each is a small standalone reusable module (single source of truth). ---
  build-linux:
    # TEMP/opt: skipped when only_aab is set so the Android/Play path can be iterated quickly.
    if: ${{ inputs.only_aab != true }}
    uses: ./.github/workflows/_build_app_linux.yml
    with: { app: "${{ inputs.app }}", code_ref: "${{ inputs.code_ref }}" }
    secrets: inherit

  build-windows:
    if: ${{ inputs.only_aab != true }}
    uses: ./.github/workflows/_build_app_windows.yml
    with: { app: "${{ inputs.app }}", code_ref: "${{ inputs.code_ref }}" }
    secrets: inherit

  build-android:
    if: ${{ inputs.build_android == true }}
    uses: ./.github/workflows/_build_app_android.yml
    with: { app: "${{ inputs.app }}", code_ref: "${{ inputs.code_ref }}" }
    secrets: inherit

  # iOS build (client and connect). Off for connect unless the caller passes build_ios=true.
  build-ios:
    if: ${{ inputs.build_ios != false && inputs.only_aab != true }}
    uses: ./.github/workflows/_build_app_ios.yml
    with: { app: "${{ inputs.app }}", code_ref: "${{ inputs.code_ref }}" }
    secrets: inherit

  # --- Store publish + release: run in the CALLER's context (its fastlane, secrets, release repo). ---

  # Publish the AAB to Google Play from the CI artifact, using the CALLER repo's fastlane (at root).
  publish-play-android:
    needs: [build-android]
    if: needs.build-android.result == 'success' && inputs.publish_play != false
    runs-on: ubuntu-latest
    env:
      GOOGLE_PLAY_API_KEY: ${{ secrets.GOOGLE_PLAY_API_KEY }}
    steps:
      - name: Checkout caller repo (fastlane, at root)
        uses: actions/checkout@v5
      - name: Checkout code (${{ env.CODE_REPO }})
        uses: actions/checkout@v5
        with: { repository: "${{ env.CODE_REPO }}", ref: "${{ inputs.code_ref }}", path: code }
      - name: Warn if Google Play API key is missing
        if: env.GOOGLE_PLAY_API_KEY == ''
        run: echo "::warning title=Google Play publish skipped::GOOGLE_PLAY_API_KEY is not set; the AAB will NOT be uploaded to Google Play and no Play-signed APK will be attached to the release."
      - name: Download built AAB artifact
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.app }}-android-google-aab
          path: aab
      - name: Resolve version, track, and paths
        if: env.GOOGLE_PLAY_API_KEY != ''
        shell: bash
        run: |
          set -e
          AAB_FILE=$(ls aab/*.aab 2>/dev/null | head -n1 || true)
          META_FILE=$(ls aab/*-android.json 2>/dev/null | head -n1 || true)
          if [ -z "$AAB_FILE" ] || [ -z "$META_FILE" ]; then
            echo "❌ AAB or its -android.json metadata not found in the build-android artifact"; exit 1
          fi
          VERSION_NAME=$(jq -r '.Version' "$META_FILE")
          VERSION_CODE=$(jq -r '(.VersionCode // .Build // .BuildNumber // "")' "$META_FILE")
          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "null" ]; then
            if echo "$VERSION_NAME" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              VERSION_CODE=$(echo "$VERSION_NAME" | awk -F'.' '{print $3}')
            else
              VERSION_CODE=$(echo "$VERSION_NAME" | tr -cd '0-9' | tail -c 9)
            fi
          fi
          ROLLOUT_PCT="${{ inputs.rollout }}"
          case "$ROLLOUT_PCT" in ''|*[!0-9]*) ROLLOUT_PCT=100 ;; esac
          if [ "$ROLLOUT_PCT" -ge 100 ]; then ROLLOUT=""; else ROLLOUT=$(awk "BEGIN{printf \"%.2f\", $ROLLOUT_PCT/100}"); fi
          PRERELEASE=$(jq -r '.Prerelease' code/pub/PubVersion.json)
          if [ "$PRERELEASE" = "true" ] || [ "$PRERELEASE" = "True" ]; then TRACK=alpha; else TRACK=production; fi
          if [ "$TRACK" != "production" ]; then ROLLOUT=""; fi
          {
            echo "AAB_PATH=$GITHUB_WORKSPACE/$AAB_FILE"
            echo "VERSION_NAME=$VERSION_NAME"
            echo "VERSION_CODE=$VERSION_CODE"
            echo "ROLLOUT=$ROLLOUT"
            echo "TRACK=$TRACK"
          } >> $GITHUB_ENV
          echo "✅ VersionName=$VERSION_NAME VersionCode=$VERSION_CODE Track=$TRACK Rollout='$ROLLOUT'"
      - name: Set up Java
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - name: Set up Ruby
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3", bundler-cache: false }
      - name: Install Fastlane
        if: env.GOOGLE_PLAY_API_KEY != ''
        run: gem install fastlane --no-document
      - name: Upload AAB to Google Play (Fastlane)
        if: env.GOOGLE_PLAY_API_KEY != ''
        run: |
          echo "Uploading $AAB_PATH (versionCode=$VERSION_CODE rollout='$ROLLOUT') to track $TRACK"
          if ! fastlane android playstore \
            version_name:"$VERSION_NAME" \
            version_code:"$VERSION_CODE" \
            aab:"$AAB_PATH" \
            track:"$TRACK" \
            rollout:"$ROLLOUT"; then
            echo "::error title=Google Play upload failed::Fastlane could not upload the AAB to track '$TRACK' (declared versionCode=$VERSION_CODE). 'Version code N has already been used' means the AAB's embedded versionCode is N — verify ApplicationVersion=$VERSION_CODE."
            exit 1
          fi
      - name: Download Play-signed universal APK (Fastlane)
        if: env.GOOGLE_PLAY_API_KEY != ''
        run: |
          fastlane android download_signed version_code:"$VERSION_CODE"
          SIGNED=$(find fastlane -type f -name "*.apk" | head -n1 || true)
          if [ -z "$SIGNED" ]; then echo "❌ No Play-signed APK found after download"; exit 1; fi
          BASE=$(basename "$AAB_PATH" .aab)
          mkdir -p "$GITHUB_WORKSPACE/play-signed"
          cp "$SIGNED" "$GITHUB_WORKSPACE/play-signed/${BASE}.apk"
          echo "✅ Play-signed APK staged: play-signed/${BASE}.apk"
      - name: Upload Play-signed APK artifact
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.app }}-android-play-signed
          if-no-files-found: error
          retention-days: 1
          path: play-signed/**

  publish-appstore-ios:
    needs: [build-ios]
    if: needs.build-ios.result == 'success' && inputs.publish_appstore != false
    runs-on: macos-26
    env:
      APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
      APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
      APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
      APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
    steps:
      - name: Checkout code (${{ env.CODE_REPO }})
        uses: actions/checkout@v5
        with: { repository: "${{ env.CODE_REPO }}", ref: "${{ inputs.code_ref }}", path: code }
      - name: Warn if App Store Connect API key is missing
        if: env.APPSTORE_CONNECT_API_KEY == ''
        run: echo "::warning title=App Store publish skipped::APPSTORE_CONNECT_API_KEY is not set; the .ipa will NOT be uploaded to TestFlight/App Store."
      - name: Download iOS artifact
        if: env.APPSTORE_CONNECT_API_KEY != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.app }}-ios
          path: ios
      - name: Resolve ipa + track
        if: env.APPSTORE_CONNECT_API_KEY != ''
        shell: bash
        run: |
          set -e
          IPA=$(ls ios/*.ipa 2>/dev/null | head -n1 || true)
          if [ -z "$IPA" ]; then
            if [ -n "$APPLE_DISTRIBUTION_CERT_BASE64" ]; then
              echo "::error title=iOS upload has no .ipa::A signed App Store build was intended (upload key + distribution cert set) but build-ios produced no .ipa. This is a real signing/build failure."
              exit 1
            fi
            echo "::warning title=No .ipa to upload::build-ios produced no .ipa (unsigned build); nothing to send to App Store Connect."
            echo "IPA_PATH=" >> $GITHUB_ENV
          else
            echo "IPA_PATH=$IPA" >> $GITHUB_ENV
          fi
          PRERELEASE=$(jq -r '.Prerelease' code/pub/PubVersion.json)
          # Connect is TestFlight-ONLY (not yet App Store review compliant) — never upload_to_app_store.
          # Client: prerelease -> TestFlight, stable -> App Store.
          if [ "${{ inputs.app }}" = "connect" ]; then
            echo "LANE=testflight" >> $GITHUB_ENV
          elif [ "$PRERELEASE" = "true" ] || [ "$PRERELEASE" = "True" ]; then
            echo "LANE=testflight" >> $GITHUB_ENV
          else
            echo "LANE=appstore" >> $GITHUB_ENV
          fi
      - name: Set up Ruby
        if: env.APPSTORE_CONNECT_API_KEY != '' && env.IPA_PATH != ''
        uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3", bundler-cache: false }
      - name: Install Fastlane
        if: env.APPSTORE_CONNECT_API_KEY != '' && env.IPA_PATH != ''
        run: gem install fastlane --no-document
      - name: Write ASC API key
        if: env.APPSTORE_CONNECT_API_KEY != '' && env.IPA_PATH != ''
        shell: bash
        run: |
          mkdir -p asc
          jq -n --arg kid "$APPSTORE_CONNECT_API_KEY_ID" --arg iss "$APPSTORE_CONNECT_ISSUER_ID" --arg key "$APPSTORE_CONNECT_API_KEY" \
            '{key_id:$kid, issuer_id:$iss, key:$key, in_house:false}' > asc/api_key.json
      - name: Upload to TestFlight / App Store (Fastlane)
        if: env.APPSTORE_CONNECT_API_KEY != '' && env.IPA_PATH != ''
        run: |
          if [ "$LANE" = "testflight" ]; then
            echo "Uploading $IPA_PATH to TestFlight"
            if ! fastlane run upload_to_testflight ipa:"$IPA_PATH" api_key_path:asc/api_key.json skip_waiting_for_build_processing:true; then
              echo "::error title=TestFlight upload failed::Fastlane pilot could not upload the .ipa. A common cause is a CFBundleVersion that is not higher than the last build."
              exit 1
            fi
          else
            echo "Uploading $IPA_PATH to App Store Connect (App Store track)"
            if ! fastlane run upload_to_app_store ipa:"$IPA_PATH" api_key_path:asc/api_key.json skip_metadata:true skip_screenshots:true submit_for_review:false force:true precheck_include_in_app_purchases:false; then
              echo "::error title=App Store upload failed::Fastlane deliver could not upload the .ipa. Verify signing and that CFBundleVersion is higher than the last build."
              exit 1
            fi
          fi

  release:
    needs: [build-linux, build-windows, build-android, publish-play-android, build-ios, publish-appstore-ios]
    if: >-
      ${{ always()
        && inputs.publish_release == true
        && needs.build-linux.result == 'success'
        && needs.build-windows.result != 'failure'
        && needs.build-android.result != 'failure'
        && needs.publish-play-android.result != 'failure'
        && needs.build-ios.result != 'failure'
        && needs.publish-appstore-ios.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # to delete this run's artifacts in the final step
    env:
      PKG: ${{ inputs.app == 'connect' && 'VpnHoodConnect' || 'VpnHoodClient' }}
      DROP_TAG: ${{ inputs.app == 'connect' && '#client' || '#connect' }}
      # The release lands on the CALLER repo; Resolve-PublishRepo reads whichever var matches the app.
      VH_PUBLISH_REPO: ${{ inputs.app != 'connect' && github.repository || '' }}
      VH_CONNECT_PUBLISH_REPO: ${{ inputs.app == 'connect' && github.repository || '' }}
    steps:
      - name: Checkout code (${{ env.CODE_REPO }})
        uses: actions/checkout@v5
        with: { repository: "${{ env.CODE_REPO }}", ref: "${{ inputs.code_ref }}", path: code }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: code/global.json }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/code/pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=code/pub/bin/$tag/$env:PKG" | Out-File -FilePath $env:GITHUB_ENV -Append
      # Reassemble the code/pub/bin/<tag>/<pkg> layout Publish-GithubRelease.ps1 expects. Windows/Android/iOS
      # are optional (skipped builds upload nothing), so those downloads are best-effort.
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.app }}-linux
          path: ${{ env.MODULE_DIR }}
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ${{ inputs.app }}-windows
          path: ${{ env.MODULE_DIR }}/windows-web
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ${{ inputs.app }}-android-google-aab
          path: ${{ env.MODULE_DIR }}/android-google
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ${{ inputs.app }}-android-web-apk
          path: ${{ env.MODULE_DIR }}/android-web
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ${{ inputs.app }}-android-web-arm64
          path: ${{ env.MODULE_DIR }}/android-web-arm64
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ${{ inputs.app }}-android-play-signed
          path: ${{ env.MODULE_DIR }}/android-google
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: ${{ inputs.app }}-ios
          path: ${{ env.MODULE_DIR }}/ios
      - name: Create GitHub release (caller repo)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          . "$env:GITHUB_WORKSPACE/code/pub/lib/Resolve-PublishRepo.ps1"
          $slug = if ("${{ inputs.app }}" -eq "connect") { Resolve-PublishRepoSlug -Connect } else { Resolve-PublishRepoSlug }
          & "$env:GITHUB_WORKSPACE/code/pub/lib/Publish-GithubRelease.ps1" `
            -packageDirName "$env:PKG" `
            -repoName $slug `
            -dropChangelogTag "$env:DROP_TAG"
      - name: Delete this run's artifacts
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ids=$(gh api --paginate \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[].id')
          if [ -z "$ids" ]; then echo "No artifacts to delete."; exit 0; fi
          for id in $ids; do
            echo "Deleting artifact id=$id"
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" || true
          done

name: Build Client · Android (reusable)

# Reusable build for the VpnHood Android client — the single source of truth for the Android build
# steps. Called by client_publish.yml (the full release pipeline) via `uses:`. Android is split into
# one matrix leg per store variant so they build in parallel
# (Google AAB / Web APK / Web arm64 APK are independent outputs). Each leg uploads its own artifact
# (client-android-<id>). The version (+ prerelease flag) is read from Pub/PubVersion.json.
#
# Signing (pass with `secrets: inherit` from the caller):
#   ANDROID_KEYSTORE_CLIENT_GOOGLE_* / ANDROID_KEYSTORE_CLIENT_WEB_*  OPTIONAL (BASE64 + PASSWORD each).
#   If a key's secrets are absent, PrepareCiAndroidSigning.ps1 generates an ephemeral throwaway keystore
#   so the build completes (NOT release/Play-Store grade).

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch or commit to build (blank = the ref this run is on)"
        type: string
        required: false
        default: ""

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: google-aab
            label: Google AAB
            script: Src/Apps/Client.Android.Google/_publish.ps1
            outdir: android-google
          - id: web-apk
            label: Web APK
            script: Src/Apps/Client.Android.Web/_publish.ps1
            outdir: android-web
          - id: web-arm64
            label: Web arm64 APK
            script: Src/Apps/Client.Android.Web/_publish-arm64.ps1
            outdir: android-web-arm64
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      # Optional Android signing — empty unless configured; PrepareCiAndroidSigning.ps1
      # falls back to an ephemeral keystore when these are absent.
      ANDROID_KEYSTORE_CLIENT_GOOGLE_BASE64: ${{ secrets.ANDROID_KEYSTORE_CLIENT_GOOGLE_BASE64 }}
      ANDROID_KEYSTORE_CLIENT_GOOGLE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_CLIENT_GOOGLE_PASSWORD }}
      ANDROID_KEYSTORE_CLIENT_WEB_BASE64: ${{ secrets.ANDROID_KEYSTORE_CLIENT_WEB_BASE64 }}
      ANDROID_KEYSTORE_CLIENT_WEB_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_CLIENT_WEB_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ inputs.ref }}" }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: global.json }
      # .NET Android needs a JDK 17 on PATH (keytool + the build tooling).
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=Pub/bin/$tag/VpnHoodClient" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Install .NET Android workload
        shell: pwsh
        run: dotnet workload install android
      # Provision the Android SDK platform/build-tools the project targets (auto-accepts licenses).
      - name: Provision Android SDK
        shell: pwsh
        run: |
          dotnet build "$env:GITHUB_WORKSPACE/Src/Apps/Client.Android.Web/VpnHood.App.Client.Android.Web.csproj" `
            -t:InstallAndroidDependencies -p:AcceptAndroidSDKLicenses=True -p:AndroidSdkPath="$env:ANDROID_HOME"
      - name: Credentials + Android signing config
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/Pub/Lib/PrepareCiAndroidSigning.ps1"
      # Materialize the per-app publish.json from the PUBLISH variable BEFORE the build so
      # PublishAndroidApp uses the real application id (com.vpnhood.client.android) instead of the
      # csproj default (com.vpnhood.client.android.debug) — otherwise Google Play rejects the AAB.
      # Passed via env (not inline ${{ }}) so the JSON braces/quotes don't break the run body.
      - name: Write publish.json
        if: vars.PUBLISH != ''
        shell: pwsh
        env:
          PUBLISH: ${{ vars.PUBLISH }}
        run: |
          $u = Join-Path (Split-Path -Parent $env:GITHUB_WORKSPACE) ".user/VpnHoodClient"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          $env:PUBLISH | Out-File (Join-Path $u "publish.json") -Encoding utf8 -Force
      - name: Write client appsettings
        shell: pwsh
        env:
          APPSETTINGS: ${{ vars.APPSETTINGS }}
          PUBLISH: ${{ vars.PUBLISH }}
        run: |
          # Shared app config embedded across all distributions. When publish.json is present it turns on
          # strict mode, which REQUIRES this file — so a missing secret must fail the Android build loudly.
          # Without publish.json (a fork with no PUBLISH var) the build is non-strict, so warn and continue.
          if ([string]::IsNullOrWhiteSpace($env:APPSETTINGS)) {
            if (-not [string]::IsNullOrWhiteSpace($env:PUBLISH)) {
              throw "APPSETTINGS variable is not set, but a strict Android publish (publish.json present) requires .user/VpnHoodClient/appsettings.json."
            }
            Write-Host "::warning::APPSETTINGS not set and no publish.json; building Android non-strict (debug application id)."
            return
          }
          $u = Join-Path (Split-Path -Parent $env:GITHUB_WORKSPACE) ".user/VpnHoodClient"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          $env:APPSETTINGS | Out-File (Join-Path $u "appsettings.json") -Encoding utf8 -Force
      # One store variant per leg (see matrix). Mirrors the android block of Pub/Client/Publish.ps1.
      - name: Build Android client (${{ matrix.label }})
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/${{ matrix.script }}"
      - uses: actions/upload-artifact@v7
        with:
          name: client-android-${{ matrix.id }}
          if-no-files-found: error
          retention-days: 1
          path: ${{ env.MODULE_DIR }}/${{ matrix.outdir }}/**

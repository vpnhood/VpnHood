name: Publish Client (All Platforms)

# Builds the client for each platform in parallel, publishes the Android AAB to Google Play
# (Fastlane, straight from the CI artifact), and finally creates ONE GitHub release with all
# assets — including the Play-signed universal APK — using the real Pub/Client/PublishToGithub.ps1
# (changelog header bump + release notes + asset upload). Version/prerelease come from
# Pub/PubVersion.json in the checked-out commit.
#
# Order: build-* -> publish-play-android (store) -> release (GitHub, LAST). The store job never
# writes to GitHub; the release job is the only GitHub writer and runs last so it can attach the
# Play-signed APK, then deletes this run's artifacts as its final step. A store publish that FAILS
# (with the key present) blocks the release; a store SKIP (no key) does not.
#
# Wired: Linux + Windows + Android (Google AAB, Web APK, Web arm64 APK) + Google Play + iOS (App Store /
# TestFlight). The iOS pair (build-ios -> publish-appstore-ios) mirrors the Android pair and, like every
# store leg, is SKIP-with-warning when its secrets are absent. iOS runs on the GitHub-HOSTED `macos-26`
# image (ships Xcode 26.5 + 26.6; .NET 11 is installed in-job), so no self-hosted runner is needed.
#
# The Play audience ratio is set by the `rollout` dispatch input (percent; 100 = full).
#
# Secrets:
#   ADVANCED_INSTALLER_LICENSE                   Advanced Installer license (Windows). If
#       absent, the Windows MSI build is SKIPPED with a warning (the job stays green); the
#       release just omits the MSI.
#   AZURE_SIGNING_CREDENTIAL + AZURE_SIGNING_TARGET  OPTIONAL code signing (Windows). The first is the
#       single Azure service-principal JSON you download from Azure; the second is a single JSON with
#       the Trusted Signing target (account/profile/endpoint). With both present, the executable and
#       the MSI are signed. If either is absent, the build is UNSIGNED (a warning is emitted). When
#       signing is configured, a signing failure is fatal.
#   ANDROID_KEYSTORE_CLIENT_GOOGLE_*  / ANDROID_KEYSTORE_CLIENT_WEB_*   OPTIONAL Android signing
#       (BASE64 + PASS each). If a key's secrets are absent, an ephemeral throwaway
#       keystore is generated so the build completes (NOT release/Play-Store grade).
#   GOOGLE_PLAY_API_KEY                           OPTIONAL Google Play service-account JSON. Present ->
#       the Android AAB is published to Play (prerelease -> alpha, stable -> production) and the
#       Play-signed APK is attached to the release. Absent -> the Play publish is skipped with a
#       warning (not a failure); the release proceeds without the signed APK.
#   APPLE_DISTRIBUTION_CERT_BASE64 + _PASSWORD, IOS_PROVISION_APP_BASE64, IOS_PROVISION_EXT_BASE64
#       OPTIONAL iOS App Store signing (Apple Distribution .p12 + its password + the App Store
#       provisioning profiles for the app and its Network Extension, each base64). All four present ->
#       build-ios produces a signed .ipa; any absent -> the build is UNSIGNED (no .ipa, a warning) and
#       the App Store upload is skipped. There is no ephemeral fallback (App Store builds can't self-sign).
#   APPSTORE_CONNECT_API_KEY (+ _API_KEY_ID + APPSTORE_CONNECT_ISSUER_ID)  OPTIONAL App Store Connect API
#       key (the .p8 CONTENTS + its key id + the issuer id). Present -> the .ipa is uploaded to TestFlight
#       (prerelease) or App Store (stable). Absent -> the upload is skipped with a warning (not a failure).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to build (blank = the branch this workflow is dispatched from)"
        required: false
        default: ""
      publish_release:
        description: "Create the GitHub release"
        type: boolean
        required: false
        default: false
      build_android:
        description: "Build the Android apps (Google AAB + Web APKs)."
        type: boolean
        required: false
        default: true
      publish_play:
        description: "Publish the built AAB to Google Play (only applies when build_android is on)"
        type: boolean
        required: false
        default: true
      only_aab:
        description: "Only build the Android AAB (+ Play publish); skip Linux/Windows. Fast Play iteration."
        type: boolean
        required: false
        default: false
      build_ios:
        description: "Build the iOS app (.ipa). Needs a macOS runner with .NET 11 + Xcode 26.5+."
        type: boolean
        required: false
        default: true
      publish_appstore:
        description: "Upload the built .ipa to TestFlight (prerelease) / App Store (stable) (only applies when build_ios is on)"
        type: boolean
        required: false
        default: true
      rollout:
        description: "Google Play audience ratio (%) for a PRODUCTION release (1-100; 100 = full). Ignored on prerelease/alpha, which always ship complete to testers."
        required: false
        default: "100"

jobs:
  # Per-platform builds are reusable workflows (single source of truth) shared with the standalone
  # client_{linux,windows,android}_build.yml entry points. Each uploads its artifact
  # (client-linux / client-windows / client-android-<id>) for the store + release jobs below.
  build-linux:
    # TEMP/opt: skipped when only_aab is set so the Android/Play path can be iterated quickly.
    if: ${{ github.event.inputs.only_aab != 'true' }}
    uses: ./.github/workflows/_build_client_linux.yml
    with:
      ref: ${{ github.event.inputs.ref || github.ref_name }}

  build-windows:
    # TEMP/opt: skipped when only_aab is set so the Android/Play path can be iterated quickly.
    if: ${{ github.event.inputs.only_aab != 'true' }}
    uses: ./.github/workflows/_build_client_windows.yml
    with:
      ref: ${{ github.event.inputs.ref || github.ref_name }}
    secrets: inherit

  # Android builds by default (build_android defaults true); dispatch with build_android=false to skip
  # it. The reusable workflow materializes the real application id (publish.json) when the PUBLISH var
  # is set. Google Play upload is separately gated by publish_play (publish-play-android job).
  build-android:
    if: ${{ github.event.inputs.build_android != 'false' }}
    uses: ./.github/workflows/_build_client_android.yml
    with:
      ref: ${{ github.event.inputs.ref || github.ref_name }}
    secrets: inherit

  # Publish the Android AAB to Google Play straight from the CI artifact (no GitHub round-trip).
  # Independent of the release: it consumes build-android's google-aab artifact, uploads to Play
  # with Fastlane (incl. store metadata/images/changelogs), then hands the Play-signed universal
  # APK to the release job as an artifact. This job is the ONLY Android store-publish path and it
  # never writes to GitHub. Behaviour by GOOGLE_PLAY_API_KEY:
  #   - absent  -> warn and skip (job green); nothing is published, no signed APK; release proceeds
  #                without it.
  #   - present -> publish; a genuine Fastlane failure fails this job (red), which BLOCKS the release.
  # Only runs when the AAB was actually built (build-android succeeded).
  publish-play-android:
    needs: [build-android]
    # Skipped unless build-android ran AND publish_play wasn't turned off for this dispatch.
    if: needs.build-android.result == 'success' && github.event.inputs.publish_play != 'false'
    runs-on: ubuntu-latest
    env:
      # Mapped to env so steps can test presence in `if:` (the `secrets` context isn't allowed there).
      GOOGLE_PLAY_API_KEY: ${{ secrets.GOOGLE_PLAY_API_KEY }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ github.event.inputs.ref || github.ref_name }}" }
      # No key -> warn and skip (the steps below are gated on the same condition). This is NOT a
      # failure: the release still proceeds, just without a Play-signed APK.
      - name: Warn if Google Play API key is missing
        if: env.GOOGLE_PLAY_API_KEY == ''
        run: |
          echo "::warning title=Google Play publish skipped::GOOGLE_PLAY_API_KEY secret is not set; the AAB will NOT be uploaded to Google Play and no Play-signed APK will be attached to the release. Add the secret (see .github/DEPLOYMENT.md) to enable Play publishing."
      - name: Download Android AAB artifact
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: actions/download-artifact@v8
        with: { name: client-android-google-aab, path: aab }
      - name: Resolve version, track, and paths
        if: env.GOOGLE_PLAY_API_KEY != ''
        shell: bash
        run: |
          set -e
          AAB_FILE=$(ls aab/*.aab 2>/dev/null | head -n1 || true)
          # The Google build's update-info sidecar is "<title>-android.json" (matches the URL the app
          # polls); *.aab is excluded so this never re-matches the binary.
          META_FILE=$(ls aab/*-android.json 2>/dev/null | head -n1 || true)
          if [ -z "$AAB_FILE" ] || [ -z "$META_FILE" ]; then
            echo "❌ AAB or its -android.json metadata not found in the build-android artifact"; exit 1
          fi
          VERSION_NAME=$(jq -r '.Version' "$META_FILE")
          VERSION_CODE=$(jq -r '(.VersionCode // .Build // .BuildNumber // "")' "$META_FILE")
          if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "null" ]; then
            if echo "$VERSION_NAME" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              VERSION_CODE=$(echo "$VERSION_NAME" | awk -F'.' '{print $3}')
            else
              VERSION_CODE=$(echo "$VERSION_NAME" | tr -cd '0-9' | tail -c 9)
            fi
          fi
          # Audience ratio (Play staged rollout) from the dispatch input, as a PERCENT (1-100, default
          # 100). Convert to the 0-1 fraction the Play API wants. 100 -> "" (a full release completes
          # rather than staging a fraction). Non-numeric/empty is coerced to 100.
          ROLLOUT_PCT="${{ github.event.inputs.rollout }}"
          case "$ROLLOUT_PCT" in ''|*[!0-9]*) ROLLOUT_PCT=100 ;; esac
          if [ "$ROLLOUT_PCT" -ge 100 ]; then ROLLOUT=""; else ROLLOUT=$(awk "BEGIN{printf \"%.2f\", $ROLLOUT_PCT/100}"); fi
          # Track from PubVersion.json: prerelease -> alpha (closed testing), stable -> production.
          PRERELEASE=$(jq -r '.Prerelease' Pub/PubVersion.json)
          if [ "$PRERELEASE" = "true" ] || [ "$PRERELEASE" = "True" ]; then TRACK=alpha; else TRACK=production; fi
          # A staged rollout (userFraction < 1) is a PRODUCTION concept — it ships to a fraction of the
          # whole user base. Closed testing (alpha) has no percentage staging: a release goes fully to
          # the assigned testers, and forcing an inProgress fraction there leaves a STUCK release that
          # never goes live and exposes no downloadable universal APK (grep the 826 incident). So stage
          # only on production; on any testing track clear the rollout so the release is 'completed'.
          if [ "$TRACK" != "production" ]; then ROLLOUT=""; fi
          {
            echo "AAB_PATH=$AAB_FILE"
            echo "VERSION_NAME=$VERSION_NAME"
            echo "VERSION_CODE=$VERSION_CODE"
            echo "ROLLOUT=$ROLLOUT"
            echo "TRACK=$TRACK"
          } >> $GITHUB_ENV
          echo "✅ VersionName=$VERSION_NAME VersionCode=$VERSION_CODE Track=$TRACK Rollout='$ROLLOUT'"
      - name: Set up Java
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - name: Set up Ruby
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3", bundler-cache: false }
      - name: Install Fastlane
        if: env.GOOGLE_PLAY_API_KEY != ''
        run: gem install fastlane --no-document
      # Upload the AAB + store metadata/images/screenshots/changelogs. A genuine failure here
      # (bad key, rejected upload, etc.) fails the job and blocks the release, as intended.
      - name: Upload AAB to Google Play (Fastlane)
        if: env.GOOGLE_PLAY_API_KEY != ''
        run: |
          echo "Uploading $AAB_PATH (versionCode=$VERSION_CODE rollout='$ROLLOUT') to track $TRACK"
          # Uploads the AAB AND the store listing (metadata/images/changelogs). To iterate on the
          # binary without touching the live listing, add `skip_metadata:"true"` (the Fastfile supports it).
          if ! fastlane android playstore \
            version_name:"$VERSION_NAME" \
            version_code:"$VERSION_CODE" \
            aab:"$AAB_PATH" \
            track:"$TRACK" \
            rollout:"$ROLLOUT"; then
            # Surface a real GitHub error annotation (not just a buried log line). The most common
            # cause is the AAB's EMBEDDED versionCode being wrong (e.g. 1) or not higher than the
            # live release — see ApplicationVersion in Directory.Build.targets.
            echo "::error title=Google Play upload failed::Fastlane could not upload the AAB to track '$TRACK' (declared versionCode=$VERSION_CODE). 'Version code N has already been used' means the AAB's embedded versionCode is N — verify the Android build stamped ApplicationVersion=$VERSION_CODE. See the Fastlane error above."
            exit 1
          fi
      # Fetch the Google Play–signed universal APK and stage it for the release job. Named to match
      # the AAB base (<title>-android.apk) so PublishToGithub.ps1 picks it up as a release asset.
      - name: Download Play-signed universal APK (Fastlane)
        if: env.GOOGLE_PLAY_API_KEY != ''
        run: |
          fastlane android download_signed version_code:"$VERSION_CODE"
          SIGNED=$(find fastlane -type f -name "*.apk" | head -n1 || true)
          if [ -z "$SIGNED" ]; then echo "❌ No Play-signed APK found after download"; exit 1; fi
          BASE=$(basename "$AAB_PATH" .aab)   # e.g. VpnHoodClient-android
          mkdir -p play-signed
          cp "$SIGNED" "play-signed/${BASE}.apk"
          echo "✅ Play-signed APK staged: play-signed/${BASE}.apk"
      - name: Upload Play-signed APK artifact
        if: env.GOOGLE_PLAY_API_KEY != ''
        uses: actions/upload-artifact@v7
        with:
          name: client-android-play-signed
          if-no-files-found: error
          retention-days: 1
          path: play-signed/**

  # iOS build. Mirrors build-android: run Client.Ios/_publish.ps1 -> Pub/bin/<tag>/VpnHoodClient/ios/
  # (<title>-ios.ipa + <title>-ios.json), upload as the client-ios artifact. Signing is materialized by
  # PrepareCiIosSigning.ps1 from the IOS_* secrets; when they're absent the build is UNSIGNED (compile
  # check + sidecar json only, no .ipa) and the job stays green — the App Store upload then finds no .ipa.
  #
  # RUNNER: the repo targets net11.0-ios and needs Xcode 26.5+, which GitHub-hosted macOS images don't
  # provide yet — so this defaults to a SELF-HOSTED mac (labels [self-hosted, macOS]). Swap runs-on to
  # 'macos-14' (or newer) once a hosted image ships .NET 11 + Xcode 26.5+.
  build-ios:
    # iOS builds by default (build_ios defaults true); skipped by build_ios=false or the only_aab fast path.
    if: ${{ github.event.inputs.build_ios != 'false' && github.event.inputs.only_aab != 'true' }}
    # macos-26 ships Xcode 26.5 (default) + 26.6 — the toolchain this net11.0-ios project needs — so the
    # whole iOS build runs on a GitHub-HOSTED runner; .NET 11 is installed below. No self-hosted mac needed.
    runs-on: macos-26
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      # Optional iOS App Store signing — empty unless configured; PrepareCiIosSigning.ps1 writes
      # ios_signing.json { Signed: false } and the build goes UNSIGNED (no .ipa) when any is absent.
      APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
      APPLE_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
      IOS_PROVISION_APP_BASE64: ${{ secrets.IOS_PROVISION_APP_BASE64 }}
      IOS_PROVISION_EXT_BASE64: ${{ secrets.IOS_PROVISION_EXT_BASE64 }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ github.event.inputs.ref || github.ref_name }}" }
      # This repo targets net11.0-ios (a preview SDK); global.json pins 10.x, so install 11 explicitly.
      # Pin matches the SDK the project is developed against; bump when the workload moves.
      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: "11.0.100-preview.5.26302.115" }
      - name: Install .NET iOS workload
        shell: pwsh
        run: dotnet workload install ios
      # Pin Xcode 26.5 — the version the net11 iOS workload expects (macos-26 ships it as the default,
      # alongside 26.6). Exact-match avoids relying on the csproj's ValidateXcodeVersion=false override.
      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=Pub/bin/$tag/VpnHoodClient" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Credentials stub
        shell: pwsh
        run: |
          $u = Join-Path (Split-Path -Parent $env:GITHUB_WORKSPACE) ".user"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          '' | Out-File (Join-Path $u "nuget_api_key.txt") -Encoding ascii -Force
      # publish.json turns on strict mode (real bundle id + required appsettings); materialize it first.
      - name: Write publish.json
        if: vars.PUBLISH != ''
        shell: pwsh
        env:
          PUBLISH: ${{ vars.PUBLISH }}
        run: |
          $u = Join-Path (Split-Path -Parent $env:GITHUB_WORKSPACE) ".user/VpnHoodClient"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          $env:PUBLISH | Out-File (Join-Path $u "publish.json") -Encoding utf8 -Force
      - name: Write client appsettings
        shell: pwsh
        env:
          APPSETTINGS: ${{ vars.APPSETTINGS }}
        run: |
          # Embedded across all distributions; publish.json above turns on strict mode which REQUIRES it.
          if ([string]::IsNullOrWhiteSpace($env:APPSETTINGS)) {
            throw "APPSETTINGS variable is not set, but a strict iOS publish requires .user/VpnHoodClient/appsettings.json."
          }
          $u = Join-Path (Split-Path -Parent $env:GITHUB_WORKSPACE) ".user/VpnHoodClient"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          $env:APPSETTINGS | Out-File (Join-Path $u "appsettings.json") -Encoding utf8 -Force
      # Import the Distribution cert into a keychain + install the App Store profiles (skip -> unsigned).
      - name: Prepare iOS signing
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/Pub/Lib/PrepareCiIosSigning.ps1"
      - name: Build iOS client (.ipa)
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/Src/Apps/Client.Ios/_publish.ps1"
      - uses: actions/upload-artifact@v7
        with:
          name: client-ios
          # An unsigned build produces only the sidecar json (no .ipa), so a missing file is a warning,
          # not an error — the pipeline stays green and the App Store upload job simply skips.
          if-no-files-found: warn
          retention-days: 1
          path: ${{ env.MODULE_DIR }}/ios/**

  # Upload the built .ipa to App Store Connect straight from the CI artifact (no GitHub round-trip),
  # mirroring publish-play-android. Track from Pub/PubVersion.json: prerelease -> TestFlight (beta),
  # stable -> App Store. Behaviour by APPSTORE_CONNECT_API_KEY:
  #   - absent  -> warn and skip (job green); nothing is uploaded; release proceeds without an App Store push.
  #   - present -> upload; a genuine Fastlane failure fails this job (red), which BLOCKS the release.
  # Also a no-op (with a warning) when build-ios produced no .ipa (unsigned build).
  publish-appstore-ios:
    needs: [build-ios]
    if: needs.build-ios.result == 'success' && github.event.inputs.publish_appstore != 'false'
    runs-on: macos-26
    env:
      # Mapped to env so steps can test presence in `if:` (the `secrets` context isn't allowed there).
      # The .p8 private-key CONTENTS, plus its key id and the ASC issuer id.
      APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
      APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
      APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
      # Presence lets a missing .ipa become a HARD error (a signed build was INTENDED) instead of a
      # fork's benign unsigned skip — mirroring publish-play-android, which exit-1s on a missing AAB.
      APPLE_DISTRIBUTION_CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_BASE64 }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ github.event.inputs.ref || github.ref_name }}" }
      # No key -> warn and skip (steps below gated on the same condition). Not a failure: the release
      # still proceeds, just without an App Store/TestFlight upload.
      - name: Warn if App Store Connect API key is missing
        if: env.APPSTORE_CONNECT_API_KEY == ''
        run: |
          echo "::warning title=App Store publish skipped::APPSTORE_CONNECT_API_KEY secret is not set; the .ipa will NOT be uploaded to TestFlight/App Store. Add APPSTORE_CONNECT_API_KEY/_API_KEY_ID/ISSUER_ID (see .github/DEPLOYMENT.md) to enable it."
      - name: Download iOS artifact
        if: env.APPSTORE_CONNECT_API_KEY != ''
        uses: actions/download-artifact@v8
        with: { name: client-ios, path: ios }
      - name: Resolve ipa + track
        if: env.APPSTORE_CONNECT_API_KEY != ''
        shell: bash
        run: |
          set -e
          IPA=$(ls ios/*.ipa 2>/dev/null | head -n1 || true)
          if [ -z "$IPA" ]; then
            # A signed App Store build was intended (upload key + distribution cert both configured) but
            # build-ios produced no .ipa -> a real signing/build failure. FAIL, don't skip green. This is
            # exactly the class of bug that let a broken cert silently ship "nothing" to TestFlight.
            if [ -n "$APPLE_DISTRIBUTION_CERT_BASE64" ]; then
              echo "::error title=iOS upload has no .ipa::APPSTORE_CONNECT_API_KEY and APPLE_DISTRIBUTION_CERT_BASE64 are both set (a signed App Store build was intended), but build-ios produced no .ipa. This is a real signing/build failure — check the build-ios 'Prepare iOS signing' + 'Build iOS client' logs."
              exit 1
            fi
            # No distribution cert configured -> the build was legitimately unsigned (a fork). Benign skip.
            echo "::warning title=No .ipa to upload::build-ios produced no .ipa (unsigned build — no distribution cert configured); nothing to send to App Store Connect."
            echo "IPA_PATH=" >> $GITHUB_ENV
          else
            echo "IPA_PATH=$IPA" >> $GITHUB_ENV
          fi
          # prerelease -> TestFlight; stable -> App Store (mirrors the Android alpha/production split).
          PRERELEASE=$(jq -r '.Prerelease' Pub/PubVersion.json)
          if [ "$PRERELEASE" = "true" ] || [ "$PRERELEASE" = "True" ]; then echo "LANE=testflight" >> $GITHUB_ENV; else echo "LANE=appstore" >> $GITHUB_ENV; fi
      - name: Set up Ruby
        if: env.APPSTORE_CONNECT_API_KEY != '' && env.IPA_PATH != ''
        uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.3", bundler-cache: false }
      - name: Install Fastlane
        if: env.APPSTORE_CONNECT_API_KEY != '' && env.IPA_PATH != ''
        run: gem install fastlane --no-document
      # Build the fastlane App Store Connect API-key JSON from the three secrets (never echoed).
      - name: Write ASC API key
        if: env.APPSTORE_CONNECT_API_KEY != '' && env.IPA_PATH != ''
        shell: bash
        run: |
          mkdir -p asc
          jq -n --arg kid "$APPSTORE_CONNECT_API_KEY_ID" --arg iss "$APPSTORE_CONNECT_ISSUER_ID" --arg key "$APPSTORE_CONNECT_API_KEY" \
            '{key_id:$kid, issuer_id:$iss, key:$key, in_house:false}' > asc/api_key.json
      - name: Upload to TestFlight / App Store (Fastlane)
        if: env.APPSTORE_CONNECT_API_KEY != '' && env.IPA_PATH != ''
        run: |
          if [ "$LANE" = "testflight" ]; then
            echo "Uploading $IPA_PATH to TestFlight"
            if ! fastlane run upload_to_testflight ipa:"$IPA_PATH" api_key_path:asc/api_key.json skip_waiting_for_build_processing:true; then
              echo "::error title=TestFlight upload failed::Fastlane pilot could not upload the .ipa. A common cause is a CFBundleVersion that is not higher than the last build (see ApplicationVersion in PublishIosApp.ps1)."
              exit 1
            fi
          else
            echo "Uploading $IPA_PATH to App Store Connect (App Store track)"
            # Uploads the binary to App Store Connect without touching the store listing or submitting for
            # review (submit_for_review:false). Promote to review from App Store Connect (or extend this to
            # submit_for_review:true once metadata/screenshots are managed here).
            if ! fastlane run upload_to_app_store ipa:"$IPA_PATH" api_key_path:asc/api_key.json skip_metadata:true skip_screenshots:true submit_for_review:false force:true precheck_include_in_app_purchases:false; then
              echo "::error title=App Store upload failed::Fastlane deliver could not upload the .ipa. Verify the App Store provisioning/signing and that CFBundleVersion is higher than the last build."
              exit 1
            fi
          fi

  release:
    needs: [build-linux, build-windows, build-android, publish-play-android, build-ios, publish-appstore-ios]
    # Runs LAST, after the store publishes, so it can attach the Play-signed APK (and the iOS .ipa). Runs
    # when asked to publish AND Linux built. Windows may have skipped the MSI (no AI license), Android may
    # be disabled (build_android=false), and iOS may be unsigned/disabled — all tolerated (skipped, not
    # failed). A genuine build FAILURE, or a store-publish FAILURE (publish-play-android / publish-appstore-ios
    # red = key present but upload failed), blocks the release. A store SKIP (no key) does not block — the
    # release just omits that store's asset.
    if: >-
      ${{ always()
        && github.event.inputs.publish_release == 'true'
        && needs.build-linux.result == 'success'
        && needs.build-windows.result != 'failure'
        && needs.build-android.result != 'failure'
        && needs.publish-play-android.result != 'failure'
        && needs.build-ios.result != 'failure'
        && needs.publish-appstore-ios.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # to delete this run's artifacts in the final step
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ github.event.inputs.ref || github.ref_name }}" }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: global.json }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=Pub/bin/$tag/VpnHoodClient" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Credentials stub
        shell: pwsh
        run: |
          $u = Join-Path (Split-Path -Parent $env:GITHUB_WORKSPACE) ".user"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          '' | Out-File (Join-Path $u "nuget_api_key.txt") -Encoding ascii -Force
      # Reassemble the Pub/bin/<tag>/VpnHoodClient layout PublishToGithub.ps1 expects. The Windows
      # and Android artifacts are optional (skipped builds upload nothing), so those downloads are
      # best-effort; PublishToGithub.ps1 attaches only the assets that actually exist.
      - uses: actions/download-artifact@v8
        with: { name: client-linux, path: "${{ env.MODULE_DIR }}" }
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: client-windows, path: "${{ env.MODULE_DIR }}/windows-web" }
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: client-android-google-aab, path: "${{ env.MODULE_DIR }}/android-google" }
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: client-android-web-apk, path: "${{ env.MODULE_DIR }}/android-web" }
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: client-android-web-arm64, path: "${{ env.MODULE_DIR }}/android-web-arm64" }
      # Play-signed universal APK from publish-play-android. Best-effort: absent when Play was
      # skipped (no key) or Android disabled; PublishToGithub.ps1 attaches it only if present.
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: client-android-play-signed, path: "${{ env.MODULE_DIR }}/android-google" }
      # iOS .ipa + sidecar from build-ios. Best-effort: absent when iOS was disabled or built unsigned
      # (no .ipa); PublishToGithub.ps1 attaches whatever assets actually exist.
      - uses: actions/download-artifact@v8
        continue-on-error: true
        with: { name: client-ios, path: "${{ env.MODULE_DIR }}/ios" }
      - name: Create GitHub release (real publish flow)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VH_PUBLISH_REPO: ${{ github.repository }}
        run: |
          . "$env:GITHUB_WORKSPACE/Pub/Lib/ResolvePublishRepo.ps1"
          & "$env:GITHUB_WORKSPACE/Pub/Lib/PublishToGithub.ps1" `
            -packageDirName "VpnHoodClient" `
            -repoName (Resolve-PublishRepoSlug) `
            -dropChangelogTag "#connect"

      # Free this run's Actions storage immediately, as the release's final step (kept out of the
      # job graph — a separate cleanup node added no value). The build artifacts are only an
      # inter-job transport (the real assets live on the GitHub release), so once the release is
      # created they can go. `if: always()` runs it even if the release step above failed. Runs
      # bounded to publish runs; build-only/failed-build runs fall back to the artifacts'
      # `retention-days: 1`.
      - name: Delete this run's artifacts
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ids=$(gh api --paginate \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[].id')
          if [ -z "$ids" ]; then echo "No artifacts to delete."; exit 0; fi
          for id in $ids; do
            echo "Deleting artifact id=$id"
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" || true
          done

# Workflow not appearing after a fresh fork/import? See .github/DEPLOYMENT.md "Activating the workflows".

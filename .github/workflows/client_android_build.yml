name: Build Client · Android (standalone)

# Build-only entry point: manually build the VpnHood Android client packages without running the
# full publish pipeline. Delegates to the shared reusable workflow _build_client_android.yml (the
# single source of truth for the build steps); each store variant is uploaded as its own
# client-android-<id> artifact (retained 1 day) for inspection. No upload to Google Play and no
# GitHub release happen here — client_publish.yml owns those.
#
# NOTE: the Android client projects currently have AOT disabled (grep "TEMP-CI-AOT-OFF") to keep CI
# builds fast. Re-enable before a production release.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to build (blank = this workflow's branch)"
        required: false
        default: ""

jobs:
  build-android:
    uses: ./.github/workflows/_build_client_android.yml
    with:
      ref: ${{ github.event.inputs.ref }}
    secrets: inherit

# Workflow not appearing after a fresh fork/import? See .github/DEPLOYMENT.md "Activating the workflows".

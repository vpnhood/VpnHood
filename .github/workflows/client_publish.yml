name: Publish Client (All Platforms)

# Builds the client for each platform in parallel, then (optionally) creates ONE
# GitHub release with all assets using the real Pub/Client/PublishToGithub.ps1
# (changelog header bump + release notes + asset upload), exactly like a normal
# release. Version/prerelease come from Pub/PubVersion.json in the checked-out commit.
#
# Wired: Linux + Windows + Android (Google AAB, Web APK, Web arm64 APK).
#
# NOTE: the Android client projects currently have AOT disabled (grep "TEMP-CI-AOT-OFF")
# to keep CI release builds fast while the pipeline is being wired. Re-enable before a
# production release.
#
# Secrets:
#   ADVANCED_INSTALLER_LICENSE                   Advanced Installer license (Windows)
#   AZURE_* + VH_SIGN_*                          OPTIONAL code signing (Windows). If
#       absent, the MSI builds unsigned. If present, signing runs and a failure is fatal.
#   ANDROID_KEYSTORE_CLIENT_GOOGLE_*  / ANDROID_KEYSTORE_CLIENT_WEB_*   OPTIONAL Android signing
#       (BASE64 + PASS each). If a key's secrets are absent, an ephemeral throwaway
#       keystore is generated so the build completes (NOT release/Play-Store grade).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to build"
        required: false
        default: "development"
      publish_release:
        description: "Create the GitHub release"
        type: boolean
        required: false
        default: false

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ github.event.inputs.ref }}" }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: global.json }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=Pub/bin/$tag/VpnHoodClient" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Credentials stub
        shell: pwsh
        run: |
          $u = Join-Path (Split-Path -Parent $env:GITHUB_WORKSPACE) ".user"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          '' | Out-File (Join-Path $u "nuget_apikey.txt") -Encoding ascii -Force
      - name: Build Linux client
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/Src/Apps/Client.Linux.Web/_publish.ps1"
        env: { DOTNET_NOLOGO: "1", DOTNET_CLI_TELEMETRY_OPTOUT: "1" }
      - uses: actions/upload-artifact@v7
        with:
          name: client-linux
          if-no-files-found: error
          retention-days: 1
          path: |
            ${{ env.MODULE_DIR }}/linux-x64/**
            ${{ env.MODULE_DIR }}/linux-arm64/**
            ${{ env.MODULE_DIR }}/linux-any/**

  build-windows:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      # Optional code signing — empty unless configured; PublishWinApp skips when absent.
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      VH_SIGN_ACCOUNT: ${{ secrets.VH_SIGN_ACCOUNT }}
      VH_SIGN_PROFILE: ${{ secrets.VH_SIGN_PROFILE }}
      VH_SIGN_ENDPOINT: ${{ secrets.VH_SIGN_ENDPOINT }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ github.event.inputs.ref }}" }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: global.json }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=Pub/bin/$tag/VpnHoodClient/windows-web" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Set up Advanced Installer
        uses: caphyon/advinst-github-action@7edde34c6ff935e53e3de72a5699efcfceb5f6c6 # v2.0.3
        with: { advinst-license: "${{ secrets.ADVANCED_INSTALLER_LICENSE }}" }
      - name: Credentials stub
        shell: pwsh
        run: |
          $u = Join-Path (Split-Path -Parent $env:GITHUB_WORKSPACE) ".user"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          '' | Out-File (Join-Path $u "nuget_apikey.txt") -Encoding ascii -Force
      - name: Build Windows client binary (dotnet publish)
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/Src/Apps/Client.Win.Web/_publish.ps1" -stage publish
      - name: Package Windows client MSI (Advanced Installer)
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/Src/Apps/Client.Win.Web/_publish.ps1" -stage package
      - name: Report MSI signature
        shell: pwsh
        run: |
          $msi = Get-ChildItem "$env:GITHUB_WORKSPACE/Pub/bin" -Recurse -Filter "VpnHoodClient-win-x64.msi" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $msi) { Write-Host "::warning::MSI not found for signature report"; return }
          $sig = Get-AuthenticodeSignature $msi
          Write-Host "MSI: $msi"
          Write-Host "Signature status: $($sig.Status)"
          if ($sig.SignerCertificate) {
            Write-Host "Signer subject : $($sig.SignerCertificate.Subject)"
            Write-Host "Signer issuer  : $($sig.SignerCertificate.Issuer)"
          } else {
            Write-Host "UNSIGNED (no signer certificate)."
          }
      - uses: actions/upload-artifact@v7
        with:
          name: client-windows
          if-no-files-found: error
          retention-days: 1
          path: ${{ env.MODULE_DIR }}/**

  # Android is split into one matrix leg per store variant so they build in parallel
  # (Google AAB / Web APK / Web arm64 APK are independent outputs). Trade-off: each leg
  # repeats the Android workload + SDK provisioning (the bulk of the time), but on a
  # public repo the runner minutes are free and wall-clock drops. Each leg uploads its
  # own artifact (client-android-<id>); the release job stitches the three back together.
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: google-aab
            label: Google AAB
            script: Src/Apps/Client.Android.Google/_publish.ps1
            outdir: android-google
          - id: web-apk
            label: Web APK
            script: Src/Apps/Client.Android.Web/_publish.ps1
            outdir: android-web
          - id: web-arm64
            label: Web arm64 APK
            script: Src/Apps/Client.Android.Web/_publish-arm64.ps1
            outdir: android-arm64-web
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      # Optional Android signing — empty unless configured; PrepareCiAndroidSigning.ps1
      # falls back to an ephemeral keystore when these are absent.
      ANDROID_KEYSTORE_CLIENT_GOOGLE_BASE64: ${{ secrets.ANDROID_KEYSTORE_CLIENT_GOOGLE_BASE64 }}
      ANDROID_KEYSTORE_CLIENT_GOOGLE_PASS: ${{ secrets.ANDROID_KEYSTORE_CLIENT_GOOGLE_PASS }}
      ANDROID_KEYSTORE_CLIENT_WEB_BASE64: ${{ secrets.ANDROID_KEYSTORE_CLIENT_WEB_BASE64 }}
      ANDROID_KEYSTORE_CLIENT_WEB_PASS: ${{ secrets.ANDROID_KEYSTORE_CLIENT_WEB_PASS }}
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ github.event.inputs.ref }}" }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: global.json }
      # .NET Android needs a JDK 17 on PATH (keytool + the build tooling).
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=Pub/bin/$tag/VpnHoodClient" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Install .NET Android workload
        shell: pwsh
        run: dotnet workload install android
      # Provision the Android SDK platform/build-tools the project targets (auto-accepts licenses).
      - name: Provision Android SDK
        shell: pwsh
        run: |
          dotnet build "$env:GITHUB_WORKSPACE/Src/Apps/Client.Android.Web/VpnHood.App.Client.Android.Web.csproj" `
            -t:InstallAndroidDependencies -p:AcceptAndroidSDKLicenses=True -p:AndroidSdkPath="$env:ANDROID_HOME"
      - name: Credentials + Android signing config
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/Pub/Core/PrepareCiAndroidSigning.ps1"
      # One store variant per leg (see matrix). Mirrors the android block of Pub/Client/Publish.ps1.
      - name: Build Android client (${{ matrix.label }})
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/${{ matrix.script }}"
      - uses: actions/upload-artifact@v7
        with:
          name: client-android-${{ matrix.id }}
          if-no-files-found: error
          retention-days: 1
          path: ${{ env.MODULE_DIR }}/${{ matrix.outdir }}/**

  release:
    needs: [build-linux, build-windows, build-android]
    if: ${{ github.event.inputs.publish_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with: { ref: "${{ github.event.inputs.ref }}" }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: global.json }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=Pub/bin/$tag/VpnHoodClient" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Credentials stub
        shell: pwsh
        run: |
          $u = Join-Path (Split-Path -Parent $env:GITHUB_WORKSPACE) ".user"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          '' | Out-File (Join-Path $u "nuget_apikey.txt") -Encoding ascii -Force
      # Reassemble the Pub/bin/<tag>/VpnHoodClient layout PublishToGithub.ps1 expects.
      - uses: actions/download-artifact@v8
        with: { name: client-linux, path: "${{ env.MODULE_DIR }}" }
      - uses: actions/download-artifact@v8
        with: { name: client-windows, path: "${{ env.MODULE_DIR }}/windows-web" }
      # Android comes back as three per-variant artifacts (matrix build); each restores
      # into its own subdir so the layout matches what PublishToGithub.ps1 expects.
      - uses: actions/download-artifact@v8
        with: { name: client-android-google-aab, path: "${{ env.MODULE_DIR }}/android-google" }
      - uses: actions/download-artifact@v8
        with: { name: client-android-web-apk, path: "${{ env.MODULE_DIR }}/android-web" }
      - uses: actions/download-artifact@v8
        with: { name: client-android-web-arm64, path: "${{ env.MODULE_DIR }}/android-arm64-web" }
      - name: Create GitHub release (real publish flow)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VH_PUBLISH_REPO: ${{ github.repository }}
        run: |
          & "$env:GITHUB_WORKSPACE/Pub/Client/PublishToGithub.ps1"

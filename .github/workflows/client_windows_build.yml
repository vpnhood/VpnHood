name: Build Client · Windows (standalone)

# Build-only entry point: manually build the VpnHood Windows client MSI without running the full
# publish pipeline. Delegates to the shared reusable workflow _build_client_windows.yml (the single
# source of truth for the build steps); the MSI is uploaded as the `client-windows` artifact
# (retained 1 day) for inspection. GitHub releases are created by client_publish.yml, not here.
#
# Needs ADVANCED_INSTALLER_LICENSE to build the MSI (skipped-with-warning if absent). Code signing
# (AZURE_SIGNING_*) is optional. Secrets are passed through via `secrets: inherit`.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit to build (blank = this workflow's branch)"
        required: false
        default: ""

jobs:
  build-windows:
    uses: ./.github/workflows/_build_client_windows.yml
    with:
      ref: ${{ github.event.inputs.ref }}
    secrets: inherit

# Workflow not appearing after a fresh fork/import? See .github/DEPLOYMENT.md "Activating the workflows".

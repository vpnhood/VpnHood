name: _build_app_android (reusable)

# Builds the Android packages (Google AAB / Web APK / Web arm64 APK, one matrix leg each) for
# client/connect from the vpnhood/VpnHood monorepo (checked out into code/). Called by publish_app.yml.
# Uploads one `<app>-android-<id>` artifact per leg. Signing keystores + Connect access keys arrive via
# `secrets: inherit`; a missing keystore falls back to an ephemeral (non-Play-grade) key.

on:
  workflow_call:
    inputs:
      app:
        description: "client | connect"
        type: string
        required: true
      code_ref:
        type: string
        required: false
        default: ""

env:
  CODE_REPO: vpnhood/VpnHood

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: google-aab
            label: Google AAB
            subdir: Android.Google
            script: _publish.ps1
            outdir: android-google
          - id: web-apk
            label: Web APK
            subdir: Android.Web
            script: _publish.ps1
            outdir: android-web
          - id: web-arm64
            label: Web arm64 APK
            subdir: Android.Web
            script: _publish-arm64.ps1
            outdir: android-web-arm64
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      PKG: ${{ inputs.app == 'connect' && 'VpnHoodConnect' || 'VpnHoodClient' }}
      PREFIX: ${{ inputs.app == 'connect' && 'Connect' || 'Client' }}
      # Standardized secret names map to the app-specific env names android-signing.json expects
      # (CLIENT_* for client, CONNECT_* for connect). Only the active app's vars are populated.
      ANDROID_KEYSTORE_CLIENT_GOOGLE_BASE64: ${{ inputs.app == 'client' && secrets.ANDROID_KEYSTORE_GOOGLE_BASE64 || '' }}
      ANDROID_KEYSTORE_CLIENT_GOOGLE_PASSWORD: ${{ inputs.app == 'client' && secrets.ANDROID_KEYSTORE_GOOGLE_PASSWORD || '' }}
      ANDROID_KEYSTORE_CLIENT_WEB_BASE64: ${{ inputs.app == 'client' && secrets.ANDROID_KEYSTORE_WEB_BASE64 || '' }}
      ANDROID_KEYSTORE_CLIENT_WEB_PASSWORD: ${{ inputs.app == 'client' && secrets.ANDROID_KEYSTORE_WEB_PASSWORD || '' }}
      ANDROID_KEYSTORE_CONNECT_GOOGLE_BASE64: ${{ inputs.app == 'connect' && secrets.ANDROID_KEYSTORE_GOOGLE_BASE64 || '' }}
      ANDROID_KEYSTORE_CONNECT_GOOGLE_PASSWORD: ${{ inputs.app == 'connect' && secrets.ANDROID_KEYSTORE_GOOGLE_PASSWORD || '' }}
      ANDROID_KEYSTORE_CONNECT_WEB_BASE64: ${{ inputs.app == 'connect' && secrets.ANDROID_KEYSTORE_WEB_BASE64 || '' }}
      ANDROID_KEYSTORE_CONNECT_WEB_PASSWORD: ${{ inputs.app == 'connect' && secrets.ANDROID_KEYSTORE_WEB_PASSWORD || '' }}
      # Connect embeds a default server access key per store; empty/unused for the client.
      ACCESS_KEY_DEFAULT_GOOGLE: ${{ secrets.ACCESS_KEY_DEFAULT_GOOGLE }}
      ACCESS_KEY_DEFAULT_WEB: ${{ secrets.ACCESS_KEY_DEFAULT_WEB }}
    steps:
      - name: Checkout code (${{ env.CODE_REPO }})
        uses: actions/checkout@v5
        with: { repository: "${{ env.CODE_REPO }}", ref: "${{ inputs.code_ref }}", path: code }
      - uses: actions/setup-dotnet@v5
        with: { global-json-file: code/global.json }
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "17" }
      - name: Resolve module dir
        shell: pwsh
        run: |
          $v = Get-Content "$env:GITHUB_WORKSPACE/code/Pub/PubVersion.json" | ConvertFrom-Json
          $tag = "v$($v.Version)" + ($(if ($v.Prerelease) { "-prerelease" } else { "" }))
          "MODULE_DIR=code/Pub/bin/$tag/$env:PKG" | Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Install .NET Android workload
        shell: pwsh
        run: dotnet workload install android
      - name: Provision Android SDK
        shell: pwsh
        run: |
          dotnet build "$env:GITHUB_WORKSPACE/code/Src/Apps/$env:PREFIX.Android.Web/VpnHood.App.$env:PREFIX.Android.Web.csproj" `
            -t:InstallAndroidDependencies -p:AcceptAndroidSDKLicenses=True -p:AndroidSdkPath="$env:ANDROID_HOME"
      - name: Credentials + Android signing config
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/code/Pub/Lib/PrepareCiAndroidSigning.ps1"
      - name: Write default access keys (connect)
        if: inputs.app == 'connect'
        shell: pwsh
        run: |
          $u = Join-Path $env:GITHUB_WORKSPACE ".user/$env:PKG"
          if (-not [string]::IsNullOrWhiteSpace($env:ACCESS_KEY_DEFAULT_GOOGLE)) {
            $d = Join-Path $u "google"; New-Item -ItemType Directory -Path $d -Force | Out-Null
            $env:ACCESS_KEY_DEFAULT_GOOGLE | Out-File (Join-Path $d "access_key_default_google.txt") -Encoding ascii -Force -NoNewline
          } else { Write-Host "::warning::ACCESS_KEY_DEFAULT_GOOGLE not set; the Google build has no default access key." }
          if (-not [string]::IsNullOrWhiteSpace($env:ACCESS_KEY_DEFAULT_WEB)) {
            $d = Join-Path $u "web"; New-Item -ItemType Directory -Path $d -Force | Out-Null
            $env:ACCESS_KEY_DEFAULT_WEB | Out-File (Join-Path $d "access_key_default_web.txt") -Encoding ascii -Force -NoNewline
          } else { Write-Host "::warning::ACCESS_KEY_DEFAULT_WEB not set; the web build has no default access key." }
      - name: Write publish.json
        if: vars.PUBLISH != ''
        shell: pwsh
        env: { PUBLISH: "${{ vars.PUBLISH }}" }
        run: |
          $u = Join-Path $env:GITHUB_WORKSPACE ".user/$env:PKG"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          $env:PUBLISH | Out-File (Join-Path $u "publish.json") -Encoding utf8 -Force
      - name: Write appsettings
        shell: pwsh
        env:
          APPSETTINGS: "${{ vars.APPSETTINGS }}"
          PUBLISH: "${{ vars.PUBLISH }}"
        run: |
          # publish.json (present when the PUBLISH var is set) turns on strict mode, which REQUIRES the
          # shared appsettings — a missing secret must fail the Android build loudly. Without it (a fork
          # with no PUBLISH var) the build is non-strict, so warn and continue.
          if ([string]::IsNullOrWhiteSpace($env:APPSETTINGS)) {
            if (-not [string]::IsNullOrWhiteSpace($env:PUBLISH)) {
              throw "APPSETTINGS variable is not set, but a strict Android publish (publish.json present) requires .user/$env:PKG/appsettings.json."
            }
            Write-Host "::warning::APPSETTINGS not set and no publish.json; building Android non-strict (debug application id)."
            return
          }
          $u = Join-Path $env:GITHUB_WORKSPACE ".user/$env:PKG"
          New-Item -ItemType Directory -Path $u -Force | Out-Null
          $env:APPSETTINGS | Out-File (Join-Path $u "appsettings.json") -Encoding utf8 -Force
      - name: Build Android (${{ matrix.label }})
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/code/Src/Apps/$env:PREFIX.${{ matrix.subdir }}/${{ matrix.script }}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.app }}-android-${{ matrix.id }}
          if-no-files-found: error
          retention-days: 1
          path: ${{ env.MODULE_DIR }}/${{ matrix.outdir }}/**
